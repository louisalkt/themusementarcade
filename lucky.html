<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>I'm feeling lucky — The Musement Arcade</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="site-wrap">
      <header class="site-header">
        <a class="brand" href="/">
          <div>
            <h1>The Musement Arcade</h1>
            <p class="small">short pieces • little observances</p>
          </div>
        </a>

        <nav class="main-nav" aria-label="Main navigation">
          <a href="/">Home</a>
          <a href="/essays.html">Essays</a>
          <a href="/words.html">Word</a>
          <a href="/wises.html">Wise</a>
          <a href="/about.html">About</a>
          <a href="/contact.html">Find me</a>
          <a href="/lucky.html" class="active">Lucky</a>
          <a href="/archive.html">Archive</a>
        </nav>
      </header>

      <main>
        <section>
          <h2>I'm feeling lucky</h2>
          <p class="small">Let the site choose something for you. Try the button below — it's an unpredictable shelf.</p>

          <div style="margin-top:18px">
            <button id="luckyBtn" style="padding:12px 18px;border-radius:8px;border:1px solid rgba(37,50,56,0.06);background:linear-gradient(180deg,#fff,#f3f7f8);cursor:pointer">Take me somewhere</button>
          </div>

          <p id="status" class="small" style="margin-top:14px">No page chosen yet.</p>
        </section>
      </main>

      <footer class="site-footer">
        <div>© The Musement Arcade</div>
        <div class="small">A small surprise on every click.</div>
      </footer>
    </div>

    <script>
      (function(){
        const pages = [
          '/essays/on-glasses.html',
          '/essays/on-squash.html'
          // Add more essay paths here as you publish them.
        ];

        const btn = document.getElementById('luckyBtn');
        const status = document.getElementById('status');
        btn.addEventListener('click', ()=>{
          if(!pages.length){ status.textContent = 'No pages available yet.'; return }
          const p = pages[Math.floor(Math.random()*pages.length)];
          status.textContent = 'Opening ' + p + '...';
          setTimeout(()=> window.location.href = p, 700);
        });
      })();
    </script>
  </body>
</html>
