<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" aria-labelledby="title desc" role="img">
  <title id="title">Hippogriff logo</title>
  <desc id="desc">Stylized hippogriff: horse head with an eagle wing.</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7fb0c3" />
      <stop offset="1" stop-color="#4b7f8f" />
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="12" fill="url(#g1)" />

  <!-- horse head silhouette -->
  <path d="M36 68c2-6 10-20 20-20 4 0 10 2 14 6 4 4 6 10 8 14 2 4 6 10 4 14-2 4-8 4-12 4-6 0-10-4-16-6-6-2-16-2-18-12z" fill="#fff" opacity="0.98"/>

  <!-- beak/face detail -->
  <path d="M60 54c4 0 8 2 10 4" stroke="#e6f2f5" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- wing: stylized feathers -->
  <g transform="translate(66,28) rotate(18)">
    <path d="M0 0c18 2 30 10 34 18 4 8 2 18-8 24-10 6-22 4-34-2" fill="#ffffff" opacity="0.95"/>
    <path d="M6 6c12 0 22 6 26 12" stroke="#e6f2f5" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M12 12c8 0 16 4 20 8" stroke="#e6f2f5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

</svg>
